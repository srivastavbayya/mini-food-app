<!DOCTYPE html>
<html>
<head>
    <title>Mini Food App</title>
</head>
<body>
    <h1>Mini Food App</h1>
    <h2>Menu Items</h2>

    {% for item in items %}
        <div>
            <h3>{{ item.name }}</h3>
            <p>Price: ₹{{ item.price }}</p>
        </div>
    {% endfor %}
</body>
</html>
